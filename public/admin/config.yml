# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
backend:
  name: github
  repo: yasi-artisan/white-on-white
  branch: main

# media_folder is where uploads are written (src/ so Astro's <Image> optimizer
# processes them at build — files in public/ are served as-is and skipped).
# public_folder is the conventional /media path stored in frontmatter;
# resolveLocalImage() in src/utils/image.ts bridges /media/<name> → src/assets/media/<name>.
# Caveat: in-admin previews expect a live /media URL, so local-image previews in
# Sveltia may not render (publish output is unaffected). Cloudinary uploads
# (cover_image) are absolute URLs and unaffected.
media_folder: /src/assets/media
public_folder: /media

media_libraries:
  default:
    config:
      max_file_size: 1024000 # default: Infinity
      slugify_filename: true # default: false
  cloudinary:
    config:
      cloud_name: dgpqqcuyf
      api_key: 447547158277739

collections:
  # Files are flat under src/data/pages (title → slug → filename). URL nesting is
  # virtual via the `parent` relation — a chain grandparent → parent → child
  # routes to /grandparent/parent/child.
  #
  # `template` chooses the page shape:
  #   index — a listing page; renders its children (Body/Gallery are ignored).
  #   show  — a regular content page (body, gallery, ...).
  # Sveltia can't hide fields by template yet, so all fields stay visible — for
  # an `index` page just leave Body/Gallery empty; they won't render.
  - name: pages
    label: Pages
    label_singular: Page
    folder: /src/data/pages
    extension: mdx
    fields:
      - {
          label: Template,
          name: template,
          widget: select,
          options: [index, show],
          default: show,
          hint: "index = a listing page that shows its child pages (Body/Gallery are ignored — leave them empty); show = a regular content page.",
        }
      - { label: Title, name: title, widget: string }
      - label: Parent page
        name: parent
        widget: relation
        collection: pages
        value_field: "{{slug}}"
        display_fields: [title]
        search_fields: [title]
        required: false
        hint: "Optional parent page. Nests this page under it (→ /<parent>/.../<this>) and drives the breadcrumb + sub-page list. Leave blank for a top-level page."
        filters:
          - field: slug
            values: ["{{slug}}"]
            exclude: true
      - {
          label: Sort,
          name: sort,
          widget: object,
          required: false,
          fields:
            [
              {
                label: Sort Order,
                name: order,
                widget: select,
                options: [asc, desc],
                required: false,
                default: desc,
              },
              {
                label: Sort By,
                name: by,
                widget: select,
                options: [title, subtitle],
                required: false,
                default: subtitle,
              },
            ],
        }
      - {
          label: Subtitle,
          name: subtitle,
          widget: markdown,
          required: false,
          buttons: [bold, italic],
          modes: [rich_text],
          editor_components: [],
        }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown, required: false }
      - {
          label: Cover Image,
          name: cover_image,
          widget: image,
          media_library: cloudinary,
          required: false,
        }
      - {
          name: gallery,
          label: Gallery,
          widget: image,
          multiple: true,
          required: false,
        }

singletons:
  - name: settings
    label: Site Settings
    file: /src/data/settings.yaml
    fields:
      - { label: Site Name, name: siteName }
      - name: menuLinks
        label: Menu Links
        widget: list
        fields:
          - name: label
            label: Label
            widget: string
          - name: url
            label: URL
            widget: string
      - name: footerLinks
        label: Footer Links
        widget: list
        fields:
          - name: label
            label: Label
            widget: string
          - name: url
            label: URL
            widget: string
      - name: landingPageSettings
        label: Landing Page Settings
        widget: object
        fields:
          - name: links
            label: Links
            widget: list
            fields:
              - name: label
                label: Label
                widget: string
              - name: href
                label: URL
                widget: string
              - name: shape
                label: Shape
                widget: select
                options:
                  - ostrich
                  - carmolek
                  - squirrel
                  - pigeon
                  - rabbit
